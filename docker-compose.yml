version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: mongo_ar
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: ar_pipeline
    depends_on:
      - mongo
    environment:
      - MONGO_URI=mongodb://mongo:27017
    command: python main.py

volumes:
  mongo_data:
